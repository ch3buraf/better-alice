<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">


  <!-- Main animation group: Moves the whale horizontally across the screen -->
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="900 0" 
      to="-900 0" 
      dur="12s" 
      repeatCount="indefinite" 
      calcMode="linear" />

    <!-- Bobbing animation group: Adds a gentle up-and-down swimming motion -->
    <g>
      <animateTransform 
        attributeName="transform" 
        type="translate" 
        values="0; -15; 0; 15; 0" 
        keyTimes="0; 0.25; 0.5; 0.75; 1" 
        dur="3s" 
        repeatCount="indefinite" 
        calcMode="spline" 
        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1" />

      <!-- Whale Body -->
      <g id="whale">
        <!-- Main silhouette -->
        <path d="M 80,200 
                 C 100,170 150,140 250,130 
                 C 400,150 550,170 700,190 
                 C 720,170 740,150 750,170 
                 C 755,180 750,190 740,190 
                 C 755,210 745,220 735,210 
                 C 725,195 720,205 700,210 
                 C 650,230 500,270 300,260 
                 C 200,250 150,230 80,200 Z" 
              fill="#FFFFFF" />
              
        <!-- Pectoral Fin -->
        <path d="M 320,220 Q 380,280 320,270 Q 280,250 300,230 Z" fill="#FFFFFF" />
        
        <!-- Dorsal Fin -->
        <path d="M 550,175 Q 560,140 580,165 Z" fill="#FFFFFF" />

        <!-- Ventral Grooves (Throat lines) -->
        <path d="M 180,230 Q 220,245 280,245" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round" />
        <path d="M 160,220 Q 200,235 260,235" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round" />
        <path d="M 140,210 Q 180,225 240,225" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round" />

        <!-- Smile -->
        <path d="M 100,210 Q 140,225 180,215" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round" />

        <!-- Eye -->
        <circle cx="210" cy="165" r="5" fill="#000000" />
        <!-- Eye catchlight -->
        <circle cx="209" cy="164" r="1.5" fill="#FFFFFF" />
      </g>

      <!-- Animated Bubbles trailing from the whale -->
      <g id="bubbles">
        <!-- Bubble 1 -->
        <circle cx="120" cy="140" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5">
          <animate attributeName="cx" values="120; 80" dur="2s" begin="0s" repeatCount="indefinite" />
          <animate attributeName="cy" values="140; 30" dur="2s" begin="0s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="1; 0" dur="2s" begin="0s" repeatCount="indefinite" />
        </circle>

        <!-- Bubble 2 -->
        <circle cx="140" cy="160" r="3" fill="none" stroke="#FFFFFF" stroke-width="1.5">
          <animate attributeName="cx" values="140; 100" dur="2.2s" begin="0.5s" repeatCount="indefinite" />
          <animate attributeName="cy" values="160; 40" dur="2.2s" begin="0.5s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="1; 0" dur="2.2s" begin="0.5s" repeatCount="indefinite" />
        </circle>

        <!-- Bubble 3 -->
        <circle cx="100" cy="120" r="5" fill="none" stroke="#FFFFFF" stroke-width="1.5">
          <animate attributeName="cx" values="100; 60" dur="1.8s" begin="1s" repeatCount="indefinite" />
          <animate attributeName="cy" values="120; 20" dur="1.8s" begin="1s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="1; 0" dur="1.8s" begin="1s" repeatCount="indefinite" />
        </circle>

        <!-- Bubble 4 -->
        <circle cx="160" cy="170" r="3.5" fill="none" stroke="#FFFFFF" stroke-width="1.5">
          <animate attributeName="cx" values="160; 120" dur="2.5s" begin="1.5s" repeatCount="indefinite" />
          <animate attributeName="cy" values="170; 50" dur="2.5s" begin="1.5s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="1; 0" dur="2.5s" begin="1.5s" repeatCount="indefinite" />
        </circle>

        <!-- Bubble 5 -->
        <circle cx="130" cy="150" r="2" fill="none" stroke="#FFFFFF" stroke-width="1.5">
          <animate attributeName="cx" values="130; 90" dur="1.5s" begin="0.25s" repeatCount="indefinite" />
          <animate attributeName="cy" values="150; 60" dur="1.5s" begin="0.25s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="1; 0" dur="1.5s" begin="0.25s" repeatCount="indefinite" />
        </circle>

        <!-- Bubble 6 -->
        <circle cx="110" cy="130" r="2.5" fill="none" stroke="#FFFFFF" stroke-width="1.5">
          <animate attributeName="cx" values="110; 70" dur="2.8s" begin="2s" repeatCount="indefinite" />
          <animate attributeName="cy" values="130; 10" dur="2.8s" begin="2s" repeatCount="indefinite" />
          <animate attributeName="opacity" values="1; 0" dur="2.8s" begin="2s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>
  </g>
</svg>