<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Continuous swimming movement */
    @keyframes swim {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5px, -5px) rotate(-2deg); }
      50% { transform: translate(0, -10px) rotate(0deg); }
      75% { transform: translate(-5px, -5px) rotate(2deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    /* Tail fluke movement */
    @keyframes tail {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-15deg); }
    }

    .whale-body {
      animation: swim 4s ease-in-out infinite;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .tail-fluke {
      animation: tail 2s ease-in-out infinite;
      transform-origin: 45px 50px;
    }
  </style>



  <g class="whale-body">
    <path d="M50,50 C70,30 130,30 160,50 C170,60 165,75 140,75 C120,75 80,70 50,50 Z" />
    
    <g class="tail-fluke">
      <path d="M50,50 L30,40 C20,35 20,65 30,60 L50,50 Z" />
    </g>
    
    <circle cx="145" cy="52" r="1.5" fill="white" />
    
    <path d="M100,58 C105,65 115,65 110,58" />
  </g>
</svg>
